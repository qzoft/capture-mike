<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Voice Recorder</title>

  <!-- PWA / iOS home screen -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Recorder">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <link rel="stylesheet" href="styles.css?v=1.9.0">
</head>
<body>
  <div id="app">
    <!-- Settings Modal -->
    <div id="settings-modal" class="hidden">
      <div id="settings-panel">
        <h2>Settings</h2>
        <label for="settings-pat">GitHub Personal Access Token</label>
        <input type="password" id="settings-pat" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
        <label for="settings-repo">Target Repo (owner/repo)</label>
        <input type="text" id="settings-repo" placeholder="username/my-notes">
        <label for="settings-lang">Speech Language</label>
        <select id="settings-lang">
          <option value="da-DK">Dansk</option>
          <option value="en-US">English (US)</option>
          <option value="en-GB">English (UK)</option>
          <option value="de-DE">Deutsch</option>
          <option value="sv-SE">Svenska</option>
          <option value="nb-NO">Norsk</option>
          <option value="fr-FR">Français</option>
          <option value="es-ES">Español</option>
        </select>
        <div id="settings-actions">
          <button id="settings-save">Save</button>
          <button id="settings-test">Test Connection</button>
          <button id="settings-close">Cancel</button>
        </div>
        <p id="settings-status" class="hidden"></p>
      </div>
    </div>

    <!-- Transcript area (fills top portion) -->
    <div id="transcript-area">
      <p id="transcript-preview" class="hidden"></p>
      <p id="record-timer" class="hidden">0:00</p>
      <div id="recordings-list">
        <p id="empty-msg">Hold the mic button to start recording</p>
      </div>
    </div>

    <!-- Bottom bar: settings, save/discard, record button -->
    <!-- Settings button (top-right) -->
    <button id="settings-btn" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
        <path d="M19.14 12.94a7.07 7.07 0 0 0 .06-.94 7.07 7.07 0 0 0-.06-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96a7.04 7.04 0 0 0-1.62-.94l-.36-2.54a.48.48 0 0 0-.48-.41h-3.84a.48.48 0 0 0-.48.41l-.36 2.54a7.04 7.04 0 0 0-1.62.94l-2.39-.96a.49.49 0 0 0-.59.22L2.74 8.87a.48.48 0 0 0 .12.61l2.03 1.58a7.07 7.07 0 0 0-.06.94c0 .32.02.64.06.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.04.7 1.62.94l.36 2.54c.05.24.26.41.48.41h3.84c.24 0 .44-.17.48-.41l.36-2.54a7.04 7.04 0 0 0 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.49.49 0 0 0-.12-.61l-2.03-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"/>
      </svg>
      <span id="version">v1.9.0</span>
    </button>

    <!-- Bottom bar: save/discard left, record button right -->
    <div id="bottom-bar">
      <div id="bottom-center">
        <button id="bar-save-btn" disabled>Save</button>
        <button id="bar-discard-btn" disabled>Discard</button>
        <p id="bar-status"></p>
      </div>
      <button id="record-btn" aria-label="Hold to record">Record</button>
    </div>
  </div>

  <!-- Auto-update: check version.txt and force-reload if stale -->
  <script>
    var APP_VERSION = "1.9.0";
    (async () => {
      // Clean up any old service workers or caches
      if ("serviceWorker" in navigator) {
        var regs = await navigator.serviceWorker.getRegistrations();
        for (var r of regs) await r.unregister();
      }
      if ("caches" in window) {
        var keys = await caches.keys();
        for (var k of keys) await caches.delete(k);
      }
      // Check if a newer version is deployed
      try {
        var resp = await fetch("version.txt?_=" + Date.now(), { cache: "no-store" });
        var latest = (await resp.text()).trim();
        if (latest && latest !== APP_VERSION && !sessionStorage.getItem("version-reloading")) {
          sessionStorage.setItem("version-reloading", "1");
          // Force fresh load by navigating to a cache-busted URL
          window.location.replace(location.pathname + "?v=" + latest + "&_=" + Date.now());
          return;
        }
        // If we just reloaded but still have old version, try one more time
        if (latest && latest !== APP_VERSION && sessionStorage.getItem("version-reloading")) {
          sessionStorage.removeItem("version-reloading");
          // Nuclear: fetch fresh HTML and replace the page
          var htmlResp = await fetch(location.pathname + "?_=" + Date.now(), { cache: "no-store" });
          var html = await htmlResp.text();
          document.open();
          document.write(html);
          document.close();
          return;
        }
      } catch (e) { /* offline or fetch failed — skip */ }
      sessionStorage.removeItem("version-reloading");
    })();
  </script>
  <script src="app.js?v=1.9.0"></script>
</body>
</html>
