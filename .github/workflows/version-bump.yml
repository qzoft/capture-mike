name: Auto Version Bump

on:
  push:
    branches: [main]

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: "!startsWith(github.event.head_commit.message, 'v') || !contains(github.event.head_commit.message, 'auto-bump')"
    steps:
      - uses: actions/checkout@v4

      - name: Check if version already bumped
        id: check
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if echo "$MSG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Bump patch version
        if: steps.check.outputs.skip == 'false'
        run: |
          # Read current version
          CURRENT=$(cat version.txt | tr -d '[:space:]')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$((PATCH + 1))
          NEW="$MAJOR.$MINOR.$PATCH"
          echo "Bumping $CURRENT -> $NEW"

          # Update version.txt
          echo "$NEW" > version.txt

          # Update index.html (all 5 references)
          sed -i "s|styles.css?v=$CURRENT|styles.css?v=$NEW|g" index.html
          sed -i "s|app.js?v=$CURRENT|app.js?v=$NEW|g" index.html
          sed -i "s|APP_VERSION = \"$CURRENT\"|APP_VERSION = \"$NEW\"|g" index.html
          sed -i "s|>v$CURRENT</span>|>v$NEW</span>|g" index.html

      - name: Commit and push
        if: steps.check.outputs.skip == 'false'
        run: |
          NEW=$(cat version.txt | tr -d '[:space:]')
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "v$NEW auto-bump"
          git push
